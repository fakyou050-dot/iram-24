name: Deploy Eram 24 to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_PUBLISHABLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InppZmhtYmJocWdvcXZxZW9maHR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4NzIzOTIsImV4cCI6MjA5OTQ0ODM5Mn0.sbth2PRkMOXS1tEyIXujYcpfiMabltLZAcR_1B35BZ8"
          VITE_SUPABASE_URL: "https://zifhmbbhqgoqvqeofhtw.supabase.co"

      - name: Copy SPA assets to root
        run: |
          # Vite outputs to dist/iram-24/ when base=/iram-24/
          # GitHub Pages needs 404.html at root (dist/)
          if [ -d dist/iram-24 ]; then
            cp dist/iram-24/404.html dist/404.html 2>/dev/null || true
            cp dist/iram-24/index.html dist/index.html 2>/dev/null || true
            cp -r dist/iram-24/* dist/ 2>/dev/null || true
            echo "Copied SPA assets from dist/iram-24/ to dist/"
          fi
          # Ensure 404.html exists
          test -f dist/404.html && echo "404.html exists" || cp dist/index.html dist/404.html
          echo "Final dist/ contents:"
          ls -la dist/ | head -20

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
