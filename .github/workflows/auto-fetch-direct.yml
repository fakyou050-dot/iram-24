# GitHub Actions: Direct news fetch (no Edge Function needed)
# This is the most reliable approach - runs entirely from GitHub
# Fetches RSS from sources in news_sources table and inserts into Supabase

name: Auto-Fetch News (Direct)

on:
  schedule:
    # Run every 30 minutes
    - cron: '*/30 * * * *'
  
  # Allow manual trigger
  workflow_dispatch:

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Fetch news from all active sources
        env:
          SUPABASE_URL: https://zifhmbbhqgoqvqeofhtw.supabase.co
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node --input-type=module << 'SCRIPT'
          
          const SUPABASE_URL = process.env.SUPABASE_URL;
          const SUPABASE_KEY = process.env.SUPABASE_KEY;
          
          // ─── Utility ──────────────────────────────────────
          function hashString(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) hash = ((hash << 5) - hash + str.charCodeAt(i)) | 0;
            return Math.abs(hash).toString(36);
          }
          
          function decodeEntities(text) {
            if (!text) return "";
            return text
              .replace(/&nbsp;/g, " ").replace(/&quot;/g, '"').replace(/&amp;/g, "&")
              .replace(/&lt;/g, "<").replace(/&gt;/g, ">").replace(/&apos;/g, "'")
              .replace(/&#(\d+);/g, (_, c) => String.fromCharCode(parseInt(c, 10)))
              .replace(/&#x([0-9a-fA-F]+);/g, (_, c) => String.fromCharCode(parseInt(c, 16)))
              .replace(/\s+/g, " ").trim();
          }
          
          function stripHtml(html) {
            return (html || "").replace(/<script[\s\S]*?<\/script>/gi, "")
              .replace(/<style[\s\S]*?<\/style>/gi, "").replace(/<[^>]+>/g, " ")
              .replace(/\s+/g, " ").trim();
          }
          
          function getTag(block, tag) {
            const escaped = tag.replace(":", "\\:");
            const re = new RegExp(`<${escaped}[^>]*>(?:<!\\[CDATA\\[([\\s\\S]*?)\\]\\]>|([\\s\\S]*?))<\\/${escaped}>`, "i");
            const m = block.match(re);
            return (m?.[1] || m?.[2] || "").trim();
          }
          
          function extractImage(block) {
            const patterns = [
              /<media:(?:content|thumbnail)[^>]+url=["']([^"']+)["']/i,
              /<enclosure[^>]+url=["']([^"']+\.(?:jpg|jpeg|png|webp|gif))[^"']*["']/i,
              /<img[^>]+src=["']([^"']+)["']/i,
            ];
            for (const p of patterns) { const m = block.match(p); if (m) return m[1]; }
            return null;
          }
          
          function classifyCategory(title, desc) {
            const t = (title + " " + desc).toLowerCase();
            if (/كرة|مباراة|دوري|بطولة|كأس|منتخب|نادي|هدف|لاعب|مدرب/.test(t)) return "رياضة";
            if (/اقتصاد|بورصة|أسهم|نفط|دولار|ذهب|بنك|استثمار|تجارة/.test(t)) return "اقتصاد";
            if (/تكنولوج|ذكاء|روبوت|هاتف|جوال|تطبيق|إنترنت/.test(t)) return "تكنولوجيا";
            if (/صحة|مرض|علاج|دواء|فيروس|لقاح|مستشفى/.test(t)) return "صحة";
            if (/انتخاب|برلمان|حكومة|رئيس|وزير|قمة|دبلوماس|حرب/.test(t)) return "سياسة";
            if (/يمن|صنعاء|عدن|مأرب|تعز|حضرموت/.test(t)) return "محلي";
            if (/مصر|سعود|إمارات|عراق|سوري|فلسطين|أردن|لبنان/.test(t)) return "عربي";
            if (/أوروب|أمريك|روسي|الصين|اليابان|فرنسا|ألمانيا|تركيا/.test(t)) return "دولي";
            return "عامة";
          }
          
          function parseRss(xml, sourceName, language, sourceCategory) {
            const items = Array.from(xml.matchAll(/<(item|entry)\b[^>]*>([\s\S]*?)<\/\1>/gi)).map(m => m[2]);
            return items.map(block => {
              const title = decodeEntities(getTag(block, "title"));
              const linkRaw = getTag(block, "link") || block.match(/<link[^>]+href=["']([^"']+)["']/)?.[1] || "";
              const link = decodeEntities(linkRaw).trim();
              if (!title || !link) return null;
              const rawDesc = getTag(block, "description") || getTag(block, "summary") || getTag(block, "content:encoded") || "";
              const description = stripHtml(decodeEntities(rawDesc)).slice(0, 320) || null;
              const pubDate = getTag(block, "pubDate") || getTag(block, "published") || getTag(block, "updated");
              const image = extractImage(block);
              const category = sourceCategory || classifyCategory(title, description || "");
              let isoDate;
              try { const t = pubDate ? new Date(decodeEntities(pubDate)).getTime() : NaN; isoDate = Number.isFinite(t) ? new Date(t).toISOString() : new Date().toISOString(); } catch { isoDate = new Date().toISOString(); }
              return { title: title.slice(0, 500), description, content: rawDesc ? decodeEntities(rawDesc).slice(0, 2000) : description, url: link.slice(0, 1000), image_url: image ? image.slice(0, 1000) : null, category, published_at: isoDate, hash: hashString(sourceName + "-" + link), author_name: sourceName };
            }).filter(Boolean);
          }
          
          // ─── Main ─────────────────────────────────────────
          async function main() {
            console.log("📰 Starting news fetch...");
            
            // 1. Get active sources
            const srcRes = await fetch(SUPABASE_URL + "/rest/v1/news_sources?is_active=eq.true&select=*", {
              headers: { apikey: SUPABASE_KEY, Authorization: "Bearer " + SUPABASE_KEY }
            });
            const sources = await srcRes.json();
            console.log("📡 Found " + sources.length + " active sources");
            
            if (sources.length === 0) {
              console.log("⚠️ No active sources. Add sources in admin panel.");
              return;
            }
            
            // 2. Fetch RSS from each source
            let totalInserted = 0;
            
            for (const source of sources) {
              const feedUrl = source.feed_url || source.url;
              if (!feedUrl) { console.log("⏭️ " + source.name + ": no feed URL"); continue; }
              
              try {
                console.log("🔄 Fetching: " + source.name + " (" + feedUrl + ")");
                const ctrl = new AbortController();
                const timer = setTimeout(() => ctrl.abort(), 15000);
                const res = await fetch(feedUrl, {
                  signal: ctrl.signal,
                  headers: { "User-Agent": "Eram24NewsBot/1.0" }
                });
                clearTimeout(timer);
                
                if (!res.ok) { console.log("❌ " + source.name + ": HTTP " + res.status); continue; }
                
                const xml = await res.text();
                const articles = parseRss(xml, source.name, source.language, source.category);
                console.log("  → Parsed " + articles.length + " articles");
                
                if (articles.length === 0) continue;
                
                // 3. Insert articles (upsert by hash)
                const enriched = articles.map(a => ({
                  ...a,
                  source_id: source.id,
                  language: source.language,
                  is_manual: false,
                  is_breaking: false,
                  show_source: true,
                  views: 0,
                }));
                
                // Batch insert (50 at a time)
                for (let i = 0; i < enriched.length; i += 50) {
                  const chunk = enriched.slice(i, i + 50);
                  const insRes = await fetch(SUPABASE_URL + "/rest/v1/articles?on_conflict=hash", {
                    method: "POST",
                    headers: {
                      apikey: SUPABASE_KEY,
                      Authorization: "Bearer " + SUPABASE_KEY,
                      "Content-Type": "application/json",
                      Prefer: "resolution=merge-duplicates,return=representation",
                    },
                    body: JSON.stringify(chunk),
                  });
                  
                  if (insRes.ok) {
                    const inserted = await insRes.json();
                    totalInserted += inserted.length;
                  }
                }
                
                // Update source metadata
                await fetch(SUPABASE_URL + "/rest/v1/news_sources?id=eq." + source.id, {
                  method: "PATCH",
                  headers: {
                    apikey: SUPABASE_KEY,
                    Authorization: "Bearer " + SUPABASE_KEY,
                    "Content-Type": "application/json",
                  },
                  body: JSON.stringify({
                    last_fetch: new Date().toISOString(),
                    last_fetch_status: "success",
                  }),
                });
                
              } catch (err) {
                console.log("❌ " + source.name + ": " + err.message);
                // Update source with error
                await fetch(SUPABASE_URL + "/rest/v1/news_sources?id=eq." + source.id, {
                  method: "PATCH",
                  headers: {
                    apikey: SUPABASE_KEY,
                    Authorization: "Bearer " + SUPABASE_KEY,
                    "Content-Type": "application/json",
                  },
                  body: JSON.stringify({ last_fetch_status: "error: " + err.message }),
                });
              }
            }
            
            // 4. Update fetch settings
            await fetch(SUPABASE_URL + "/rest/v1/fetch_settings?id=not.is.null", {
              method: "PATCH",
              headers: {
                apikey: SUPABASE_KEY,
                Authorization: "Bearer " + SUPABASE_KEY,
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                last_fetch_time: new Date().toISOString(),
                last_fetch_count: totalInserted,
              }),
            });
            
            console.log("✅ Done! Inserted " + totalInserted + " new articles");
          }
          
          main().catch(err => { console.error("💥 Fatal:", err.message); process.exit(1); });
          SCRIPT
