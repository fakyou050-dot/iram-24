<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إيرام 24</title>
    <script>
      (function () {
        var l = window.location;
        var repoBase = '/iram-24';
        var path = l.pathname.startsWith(repoBase) ? l.pathname.slice(repoBase.length) : l.pathname;
        var redirect = repoBase + '/?/' + path.replace(/^\//, '') + (l.search ? '&' + l.search.slice(1) : '') + l.hash;
        l.replace(redirect);
      })();
    </script>
  </head>
  <body></body>
</html>
