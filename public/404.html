<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إيرام 24</title>
    <meta property="og:site_name" content="إيرام 24" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <script>
      (function () {
        var l = window.location;
        var repoBase = l.pathname.startsWith('/iram-24/') ? '/iram-24' : '';
        var path = repoBase && l.pathname.startsWith(repoBase)
          ? l.pathname.slice(repoBase.length)
          : l.pathname;
        var siteOrigin = l.origin + repoBase;
        var supabaseUrl = 'https://zifhmbbhqgoqvqeofhtw.supabase.co';
        var anonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InppZmhtYmJocWdvcXZxZW9maHR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4NzIzOTIsImV4cCI6MjA5OTQ0ODM5Mn0.sbth2PRkMOXS1tEyIXujYcpfiMabltLZAcR_1B35BZ8';
        var ua = navigator.userAgent || '';
        var isCrawler = /facebookexternalhit|Facebot|WhatsApp|Twitterbot|TelegramBot|LinkedInBot|Slackbot|Discordbot|Applebot|Googlebot|bingbot|Pinterest|SkypeUriPreview|Embedly/i.test(ua);
        var staticPages = ['categories', 'favorites', 'settings', 'radio', 'about', 'privacy', 'terms', 'contact'];
        var firstSegment = path.replace(/^\//, '').split('/')[0];

        function withBase(nextPath) {
          return (repoBase || '') + nextPath;
        }

        function redirectToSpa(nextPath) {
          var clean = nextPath.replace(/^\//, '');
          l.replace(withBase('/?/' + clean) + (l.search ? '&' + l.search.slice(1) : '') + l.hash);
        }

        if (staticPages.indexOf(firstSegment) !== -1) {
          redirectToSpa(path);
          return;
        }

        var articleMatch = path.match(/^\/article\/([a-f0-9-]+)$/i);
        if (articleMatch) {
          var articleId = articleMatch[1];
          var target = withBase('/?/article/' + articleId);

          try {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', supabaseUrl + '/rest/v1/articles?select=title,description,image_url,category&limit=1&id=eq.' + articleId, false);
            xhr.setRequestHeader('apikey', anonKey);
            xhr.setRequestHeader('Authorization', 'Bearer ' + anonKey);
            xhr.send();

            if (xhr.status === 200) {
              var data = JSON.parse(xhr.responseText);
              if (data && data.length > 0) {
                var article = data[0];
                var title = (article.title || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
                var desc = (article.description || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').substring(0, 200);
                var image = article.image_url || '';

                document.title = title + ' | إيرام 24';

                var setMeta = function (prop, content) {
                  var el = document.createElement('meta');
                  el.setAttribute('property', prop);
                  el.setAttribute('content', content);
                  document.head.appendChild(el);
                };

                var setName = function (name, content) {
                  var el = document.createElement('meta');
                  el.setAttribute('name', name);
                  el.setAttribute('content', content);
                  document.head.appendChild(el);
                };

                setMeta('og:title', title);
                setMeta('og:description', desc);
                setMeta('og:url', siteOrigin + '/article/' + articleId);
                setMeta('og:type', 'article');
                setName('description', desc);
                setName('twitter:title', title);
                setName('twitter:description', desc);

                if (image) {
                  setMeta('og:image', image);
                  setMeta('og:image:width', '1200');
                  setMeta('og:image:height', '630');
                  setMeta('og:image:alt', title);
                  setName('twitter:image', image);
                  setName('twitter:card', 'summary_large_image');
                } else {
                  setName('twitter:card', 'summary');
                }

                var ld = document.createElement('script');
                ld.type = 'application/ld+json';
                ld.text = JSON.stringify({
                  '@context': 'https://schema.org',
                  '@type': 'NewsArticle',
                  headline: article.title,
                  description: article.description || '',
                  image: image ? [image] : undefined,
                  datePublished: new Date().toISOString(),
                  publisher: { '@type': 'Organization', name: 'إيرام 24' }
                });
                document.head.appendChild(ld);

                if (!isCrawler) {
                  l.replace(target);
                }
                return;
              }
            }
          } catch (e) {}

          l.replace(target);
          return;
        }

        redirectToSpa(path);
      })();
    </script>
  </head>
  <body>
    <h1>إيرام 24</h1>
    <p>جاري تحميل المحتوى...</p>
    <p><a href="/">العودة للرئيسية</a></p>
  </body>
</html>
