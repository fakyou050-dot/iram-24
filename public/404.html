<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إيرام 24</title>
    <meta property="og:site_name" content="إيرام 24" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <script>
      (function () {
        var l = window.location;
        var repoBase = '/iram-24';
        var path = l.pathname.startsWith(repoBase) ? l.pathname.slice(repoBase.length) : l.pathname;

        // Static pages that can be redirected without fetching data
        var staticPages = ['categories', 'favorites', 'settings', 'radio', 'about', 'privacy', 'terms', 'contact'];
        var firstSegment = path.replace(/^\//, '').split('/')[0];

        if (staticPages.indexOf(firstSegment) !== -1) {
          var redirect = repoBase + '/?/' + path.replace(/^\//, '') + (l.search ? '&' + l.search.slice(1) : '') + l.hash;
          l.replace(redirect);
          return;
        }

        // Article page — redirect to Edge Function for proper OG tags
        // The Edge Function serves full HTML with OG tags for crawlers,
        // and meta-refresh redirects humans to the SPA
        var articleMatch = path.match(/^\/article\/([a-f0-9-]+)$/);
        if (articleMatch) {
          var articleId = articleMatch[1];
          var OG_FUNCTION_URL = 'https://zifhmbbhqgoqvqeofhtw.supabase.co/functions/v1/og-article?id=' + articleId;
          l.replace(OG_FUNCTION_URL);
          return;
        }

        // Default SPA redirect
        var redirect = repoBase + '/?/' + path.replace(/^\//, '') + (l.search ? '&' + l.search.slice(1) : '') + l.hash;
        l.replace(redirect);
      })();
    </script>
  </head>
  <body></body>
</html>
